<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Canvas Designer</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/reactflow@11.11.4/dist/style.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.topbar{height:44px;background:#1a1a2e;color:#fff;display:flex;align-items:center;padding:0 16px;gap:16px;font-size:13px;user-select:none;z-index:10;position:relative}
.topbar-brand{font-weight:700;font-size:14px;letter-spacing:.5px}
.topbar-brand span{color:#818cf8}
.topbar-title{background:0 0;border:none;color:#aaa;font-size:12px;outline:none;flex:1;padding:2px 4px;border-bottom:1px solid transparent;font-family:inherit}
.topbar-status{font-size:11px;padding:3px 10px;border-radius:10px;background:#2a2a3e}
.topbar-status.saved{color:#4ade80}.topbar-status.saving{color:#fbbf24}.topbar-status.error{color:#f87171}
.app-layout{display:flex;height:calc(100vh - 44px)}
.toolbar{width:48px;background:#1e1e32;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;user-select:none;border-right:1px solid #2a2a3e}
.tool-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:grab;font-size:16px;transition:all .15s;border:1px solid transparent;position:relative}
.tool-btn:active{cursor:grabbing}
.tool-btn:hover{background:#2a2a3e;border-color:#3a3a5e;transform:scale(1.1)}
.tool-btn::after{content:attr(data-label);position:absolute;left:48px;background:#1a1a2e;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:100}
.tool-btn:hover::after{opacity:1}
.config-panel{width:320px;background:#1e1e32;border-left:1px solid #2a2a3e;overflow-y:auto;padding:16px;font-size:13px;color:#ddd}
.config-panel h3{font-size:13px;font-weight:600;margin-bottom:12px;color:#818cf8;text-transform:uppercase;letter-spacing:1px}
.empty-state{color:#666;text-align:center;padding:40px 0;font-size:12px;line-height:1.8}
.config-group{margin-bottom:14px}
.config-group label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.config-group input,.config-group textarea,.config-group select{width:100%;background:#2a2a3e;border:1px solid #3a3a5e;border-radius:6px;padding:7px 10px;color:#eee;font-size:12px;font-family:'SF Mono',Monaco,monospace}
.config-group input:focus,.config-group textarea:focus{outline:none;border-color:#6366f1}
.config-group textarea{resize:vertical;min-height:60px}
.field-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.field-header label{margin-bottom:0!important}
.copy-btn{background:#2a2a3e;border:1px solid #3a3a5e;color:#888;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;transition:all .15s;line-height:1.4}
.copy-btn:hover{color:#fff;border-color:#6366f1;background:#3a3a5e}
.copy-btn.copied{color:#4ade80;border-color:#4ade80}
.help-text{font-size:10px;color:#666;margin-top:3px}
.del-btn{width:100%;padding:8px;border:1px solid #5c1a1a;background:#2a0a0a;color:#ef4444;border-radius:6px;cursor:pointer;font-size:12px;margin-top:8px}
.del-btn:hover{background:#3a0a0a}
.node-box{padding:8px 16px;border-radius:8px;border:2px solid transparent;font-size:12px;font-weight:600;text-align:center;min-width:100px;transition:box-shadow .15s}
.node-icon{font-size:16px;display:block;margin-bottom:2px}
.node-label{font-size:12px}
.node-type-tag{font-size:9px;font-weight:400;opacity:.6;margin-top:1px;letter-spacing:.5px}
.react-flow__node.selected .node-box{border-color:#6366f1!important;box-shadow:0 0 0 2px #6366f144}
.react-flow__handle{opacity:0}
.node-start .node-box{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.node-end .node-box{background:#fce4ec;color:#c62828;border-color:#ef9a9a}
.node-llm .node-box{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.node-agent .node-box{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
.node-knowledge .node-box{background:#e0f7fa;color:#00695c;border-color:#80deea}
.node-ask-table .node-box{background:#fef3c7;color:#92400e;border-color:#fbbf24}
.node-api-request .node-box{background:#e0f2fe;color:#0369a1;border-color:#7dd3fc}
.node-reply .node-box{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.node-condition .node-box{background:#fef3c7;color:#92400e;border-color:#fde68a}
.node-classifier .node-box{background:#fff7ed;color:#9a3412;border-color:#fdba74}
.node-code .node-box{background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7}
.node-param-extractor .node-box{background:#ede9fe;color:#6d28d9;border-color:#c4b5fd}
.node-doc-extractor .node-box{background:#fef9c3;color:#a16207;border-color:#fde047}
.node-container .node-box{background:#fce7f3;color:#9d174d;border-color:#f9a8d4;border-style:dashed}
.react-flow__edge-path{stroke:#555;stroke-width:2}
.react-flow__edge.selected .react-flow__edge-path{stroke:#6366f1;stroke-width:2.5}
.react-flow__connection-path{stroke:#6366f1;stroke-width:2}
.react-flow__controls{border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.react-flow__controls button{background:#1e1e32!important;border-color:#2a2a3e!important;color:#ccc!important;width:28px!important;height:28px!important}
.react-flow__controls svg{fill:#ccc}
.config-panel::-webkit-scrollbar{width:4px}
.config-panel::-webkit-scrollbar-thumb{background:#3a3a5e;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ========== 14 种节点定义（来自 NODE-GUIDE.md + CONFIG-REFERENCE.md） ==========
var NODE_DEFS = {
  start:          {icon:'🚪',label:'开始',     color:'#065f46',fields:[]},
  end:            {icon:'🏁',label:'结束',     color:'#c62828',fields:[]},
  llm:            {icon:'🧠',label:'LLM',      color:'#1e40af',fields:['title','model','system_prompt','user_prompt']},
  agent:          {icon:'🛠️',label:'Agent',    color:'#5b21b6',fields:['title','model','system_prompt','user_prompt','tools','max_iterations','output_schema']},
  knowledge:      {icon:'📚',label:'知识检索', color:'#00695c',fields:['kb_type','query','top_k','threshold']},
  'ask-table':    {icon:'📊',label:'NL查表',   color:'#b45309',fields:['table','db_type','question']},
  'api-request':  {icon:'🌐',label:'API调用',  color:'#0369a1',fields:['method','url','headers','body']},
  reply:          {icon:'💬',label:'回复',     color:'#065f46',fields:['reply_type','content']},
  condition:      {icon:'🔀',label:'条件分支', color:'#92400e',fields:['input_var','branches']},
  classifier:     {icon:'🏷️',label:'分类',     color:'#92400e',fields:['input_source','categories','model']},
  code:           {icon:'⚡',label:'代码',     color:'#1b5e20',fields:['inputs','outputs','code']},
  'param-extractor':{icon:'🔍',label:'结构化提取',color:'#6d28d9',fields:['model','input_text','param_schema']},
  'doc-extractor':{icon:'📄',label:'文件提取', color:'#a16207',fields:['source','extract_mode']},
  container:      {icon:'👤',label:'子画布',   color:'#9d174d',fields:['container_type','loop_desc']}
};

// ========== 每种节点的配置字段定义 ==========
var FIELD_DEFS = {
  // LLM / Agent 共有
  title:          {label:'节点标题',type:'text'},
  model:          {label:'模型',type:'text',help:'如 gpt-4 / minimax-pro'},
  system_prompt:  {label:'System Prompt',type:'textarea',help:'三段式：角色→输出→规则',rows:6},
  user_prompt:    {label:'User Prompt',type:'textarea',help:'支持 {{变量}} 引用',rows:4},
  // Agent 专有
  tools:          {label:'工具列表',type:'textarea',help:'格式："[\\"工具A\\",\\"工具B\\"]"'},
  max_iterations: {label:'最大迭代',type:'text',help:'简单1-2 / 中等3-5 / 复杂5-10'},
  output_schema:  {label:'输出 Schema',type:'textarea',help:'格式："{\\"field\\":\\"说明\\"}"'},
  // Knowledge
  kb_type:        {label:'知识库名称',type:'text'},
  query:          {label:'检索表达式',type:'text',help:'支持 {{变量}} 插值'},
  top_k:          {label:'Top K',type:'text',help:'返回最相关结果数量'},
  threshold:      {label:'相似度阈值',type:'text',help:'0-1，越高越严格'},
  // Ask-table
  table:          {label:'表名',type:'text'},
  db_type:        {label:'数据库类型',type:'select',options:['MySQL','PostgreSQL','SQLite']},
  question:       {label:'自然语言问题',type:'text',help:'支持 {{变量}}'},
  // API-request
  method:         {label:'HTTP 方法',type:'select',options:['GET','POST','PUT','DELETE']},
  url:            {label:'URL',type:'text'},
  headers:        {label:'请求头',type:'textarea',help:'JSON 格式，如 {"Authorization":"Bearer xxx"}'},
  body:           {label:'请求体',type:'textarea',help:'JSON 格式，支持 {{变量}}'},
  // Reply
  reply_type:     {label:'回复类型',type:'select',options:['直接回复','模板回复']},
  content:        {label:'回复内容',type:'textarea',help:'支持 {{变量}} 插值',rows:3},
  // Condition
  input_var:      {label:'条件变量',type:'text',help:'如 {{n4.output.status}}'},
  branches:       {label:'分支定义',type:'textarea',help:'每行：标签 → 条件',rows:3},
  // Classifier
  input_source:   {label:'分类输入',type:'text',help:'如 {{sys.query}}'},
  categories:     {label:'分类类别',type:'textarea',help:'每行：类别名 → 说明',rows:4},
  // Code
  inputs:         {label:'输入参数',type:'textarea',help:'每行：名称: 类型',rows:2},
  outputs:        {label:'输出参数',type:'textarea',help:'每行：名称: 类型',rows:2},
  code:           {label:'Python 代码',type:'textarea',help:'必须包含 main() 函数，返回 dict',rows:8},
  // Param-extractor
  input_text:     {label:'输入文本',type:'text',help:'如 {{n2.output}}'},
  param_schema:   {label:'参数 Schema',type:'textarea',help:'格式："{\\"field\\":\\"说明\\"}"'},
  // Doc-extractor
  source:         {label:'文件来源',type:'select',options:['sys.files']},
  extract_mode:   {label:'提取模式',type:'select',options:['全文提取','关键信息提取']},
  // Container
  container_type: {label:'容器类型',type:'select',options:['迭代','循环','对话']},
  loop_desc:      {label:'内部逻辑描述',type:'textarea',help:'描述循环/迭代的交互流程',rows:3}
};

var TOOLBAR = Object.keys(NODE_DEFS).map(function(t){return {type:t,icon:NODE_DEFS[t].icon,label:NODE_DEFS[t].label}});

// ========== Helpers ==========
var h = React.createElement;
var idCounter = 0;

function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src; s.onload = cb;
  document.head.appendChild(s);
}

// ========== Custom Node ==========
function CanvasNode(props) {
  var d = props.data;
  var info = NODE_DEFS[d.nodeType] || NODE_DEFS.llm;
  var validated = d.validated;
  return h('div', {className:'node-box node-'+d.nodeType, style: validated ? {borderColor:'#4ade80', boxShadow:'0 0 0 2px #4ade8044'} : {}},
    d.nodeType !== 'start' && d.nodeType !== 'end' ? h(ReactFlow.Handle, {type:'target',position:ReactFlow.Position.Left,style:{background:'#555',width:8,height:8,border:'2px solid #333'}}) : null,
    d.nodeType !== 'end' ? h(ReactFlow.Handle, {type:'source',position:ReactFlow.Position.Right,style:{background:'#555',width:8,height:8,border:'2px solid #333'}}) : null,
    validated ? h('span', {style:{position:'absolute',top:'-8px',right:'-8px',fontSize:'14px',background:'#4ade80',borderRadius:'50%',width:'18px',height:'18px',display:'flex',alignItems:'center',justifyContent:'center',border:'1.5px solid #22c55e',color:'#052e16',fontWeight:'bold',lineHeight:'1'}}, '✓') : null,
    h('span',{className:'node-icon'}, info.icon),
    h('span',{className:'node-label'}, d.label || info.label),
    h('span',{className:'node-type-tag'}, info.label)
  );
}

var nodeTypes = {custom: CanvasNode};

// ========== Config Panel ==========
function ConfigPanel(props) {
  var node = props.node, onUpdate = props.onUpdate, onDelete = props.onDelete;
  if (!node) return h('div',{className:'config-panel'},
    h('div',{className:'empty-state'},
      h('div',{style:{fontSize:'32px',marginBottom:'12px'}},'🎨'),
      h('div',{style:{fontWeight:600,color:'#888',marginBottom:'8px'}},'选择节点查看配置'),
      h('div',{style:{fontSize:'11px',color:'#555',lineHeight:'1.8'}},'从左侧工具栏拖入节点\n点击节点编辑参数\n按 Delete 键删除节点\n拖动连线建立连接')
    )
  );
  var info = NODE_DEFS[node.data.nodeType];
  var fields = info ? info.fields : [];
  var children = [h('h3',{key:'title'}, (info?info.icon:'')+' '+(info?info.label:'')+' 配置')];
  fields.forEach(function(key){
    var fd = FIELD_DEFS[key]; if(!fd) return;
    var val = node.data[key] || '';
    var el;
    var hasCopy = fd.type==='textarea' || fd.type==='text';
    // copy button state key
    var copyKey = 'copy_'+node.id+'_'+key;
    if (fd.type==='textarea') {
      el = h('textarea',{key:key,value:val,onChange:function(e){onUpdate(node.id,key,e.target.value)},rows:fd.rows||3,placeholder:fd.help||''});
    } else if (fd.type==='select') {
      var opts = [h('option',{key:'_',value:''},'- 选择 -')];
      (fd.options||[]).forEach(function(o){opts.push(h('option',{key:o,value:o},o))});
      el = h('select',{key:key,value:val,onChange:function(e){onUpdate(node.id,key,e.target.value)}},opts);
    } else {
      el = h('input',{key:key,type:'text',value:val,onChange:function(e){onUpdate(node.id,key,e.target.value)},placeholder:fd.help||''});
    }
    var labelEl = hasCopy
      ? h('div',{className:'field-header',key:'fh-'+key},
          h('label',null,fd.label),
          h('button',{className:'copy-btn',key:'cp-'+key,onClick:function(e){
            e.preventDefault();e.stopPropagation();
            var text = val;
            if(navigator.clipboard){navigator.clipboard.writeText(text)}else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
            var btn=e.target;btn.textContent='已复制';btn.classList.add('copied');setTimeout(function(){btn.textContent='复制';btn.classList.remove('copied')},1200);
          }},'复制')
        )
      : h('label',{key:'lb-'+key},fd.label);
    children.push(h('div',{className:'config-group',key:'g-'+key},
      labelEl, el,
      fd.help ? h('div',{className:'help-text'},fd.help) : null
    ));
  });
  if (node.data.nodeType!=='start' && node.data.nodeType!=='end') {
    // Validation toggle
    var isValidated = node.data.validated;
    children.push(h('button', {
      key: 'validate',
      style: {
        width: '100%', padding: '8px', borderRadius: '6px', cursor: 'pointer',
        fontSize: '12px', marginTop: '4px',
        border: isValidated ? '1px solid #166534' : '1px solid #3a3a5e',
        background: isValidated ? '#052e16' : '#2a2a3e',
        color: isValidated ? '#4ade80' : '#888'
      },
      onClick: function() { onUpdate(node.id, 'validated', !isValidated); }
    }, isValidated ? '✓ 已验证' : '○ 标记为已验证'));

    children.push(h('button',{key:'del',className:'del-btn',onClick:function(){onDelete(node.id)}},'🗑️ 删除节点'));
  }
  return h('div',{className:'config-panel'},children);
}

// ========== App ==========
function App() {
  var nodesState = ReactFlow.useNodesState([]);
  var edgesState = ReactFlow.useEdgesState([]);
  var nodes = nodesState[0], setNodes = nodesState[1], onNodesChange = nodesState[2];
  var edges = edgesState[0], setEdges = edgesState[1], onEdgesChange = edgesState[2];
  var selectedRef = React.useRef(null);
  var forceUpdate = React.useState(0)[1];
  var saveStatusRef = React.useRef('saved');
  var titleRef = React.useRef('未命名流程');
  var rfInstance = ReactFlow.useReactFlow();

  // Load config on mount
  React.useEffect(function(){
    fetch('/get-state').then(function(r){return r.json()}).then(function(data){
      if(data.nodes && data.nodes.length>0){
        var fn = data.nodes.map(function(n){
          return {id:n.id,type:'custom',position:{x:n.x||100,y:n.y||100},data:Object.assign({nodeType:n.type,label:n.label||'',validated:n.validated||false},n.config||{})};
        });
        var fe = (data.connections||[]).map(function(e){
          return {id:e.sourceId+'-'+e.targetId,source:e.sourceId,target:e.targetId,markerEnd:{type:ReactFlow.MarkerType.ArrowClosed,color:'#888'},style:{stroke:'#555',strokeWidth:2}};
        });
        setNodes(fn); setEdges(fe);
        // idCounter = max numeric id to avoid duplicates
        var maxId = 0;
        fn.forEach(function(n){var m=n.id.match(/\d+/);if(m){var v=parseInt(m[0]);if(v>maxId)maxId=v}});
        idCounter = maxId;
        if(data.meta && data.meta.title) titleRef.current = data.meta.title;
        forceUpdate(function(c){return c+1});
      }
    }).catch(function(){});
  },[]);

  // Auto save
  var saveTimer = React.useRef(null);
  var lastSavedConfig = React.useRef(null);
  
  function getConfigSnapshot() {
    return {
      meta: titleRef.current,
      nodes: nodes.map(function(n){return {
        id:n.id,type:n.data.nodeType,label:n.data.label||'',
        x:n.position.x,y:n.position.y,validated:n.data.validated||false,
        config:Object.fromEntries(Object.entries(n.data).filter(function(e){return e[0]!=='nodeType'&&e[0]!=='label'&&e[0]!=='validated'}))
      }}),
      connections:edges.map(function(e){return {sourceId:e.source,targetId:e.target}})
    };
  }
  
  function hasConfigChange(oldSnap, newSnap) {
    if (!oldSnap) return true;
    if (oldSnap.meta !== newSnap.meta) return true;
    if (JSON.stringify(oldSnap.connections) !== JSON.stringify(newSnap.connections)) return true;
    var oldNodes = oldSnap.nodes, newNodes = newSnap.nodes;
    if (oldNodes.length !== newNodes.length) return true;
    for (var i=0; i<newNodes.length; i++) {
      var on = oldNodes[i], nn = newNodes[i];
      if (on.id !== nn.id || on.type !== nn.type || on.label !== nn.label) return true;
      if (on.validated !== nn.validated) return true;
      if (JSON.stringify(on.config) !== JSON.stringify(nn.config)) return true;
    }
    return false;
  }
  
  var doSave = React.useCallback(function(){
    var snap = getConfigSnapshot();
    if (!hasConfigChange(lastSavedConfig.current, snap)) {
      // 配置没变化（只是位置变化），跳过保存
      saveStatusRef.current = 'saved';
      forceUpdate(function(c){return c+1});
      return;
    }
    
    saveStatusRef.current = 'saving'; forceUpdate(function(c){return c+1});
    var payload = {version:'2.0',flow:'custom',meta:{title:snap.meta,description:''},
      nodes:snap.nodes.map(function(n){return {id:n.id,type:n.type,label:n.label,x:Math.round(n.x),y:Math.round(n.y),validated:n.validated,config:n.config}}),
      connections:snap.connections};
    fetch('/save-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(function(r){return r.json()})
      .then(function(ret){
        saveStatusRef.current='saved';lastSavedConfig.current=snap;forceUpdate(function(c){return c+1});
      })
      .catch(function(){saveStatusRef.current='error';forceUpdate(function(c){return c+1})});
  },[nodes,edges]);
  
  React.useEffect(function(){
    if(saveTimer.current) clearTimeout(saveTimer.current);
    if(nodes.length>0||edges.length>0) {
      saveTimer.current = setTimeout(doSave, 500);
    }
  },[nodes,edges,doSave]);

  // Events
  var onConnect = React.useCallback(function(p){
    setEdges(function(eds){return ReactFlow.addEdge(Object.assign({},p,{markerEnd:{type:ReactFlow.MarkerType.ArrowClosed,color:'#888'},style:{stroke:'#555',strokeWidth:2}}),eds)});
  },[setEdges]);

  var onNodeClick = React.useCallback(function(_,node){
    selectedRef.current = node; forceUpdate(function(c){return c+1});
  },[]);

  var onPaneClick = React.useCallback(function(){
    selectedRef.current = null; forceUpdate(function(c){return c+1});
  },[]);

  // DnD
  var onDragOver = React.useCallback(function(e){e.preventDefault();e.dataTransfer.dropEffect='move'},[]);
  var onDrop = React.useCallback(function(e){
    e.preventDefault();
    var type = e.dataTransfer.getData('application/reactflow');
    if(!type || !NODE_DEFS[type]) return;
    var pos = rfInstance.screenToFlowPosition({x:e.clientX,y:e.clientY});
    idCounter++;
    setNodes(function(nds){return nds.concat([{id:'n'+idCounter,type:'custom',position:pos,data:{nodeType:type,label:NODE_DEFS[type].label}}])});
  },[rfInstance,setNodes]);

  var onDragStart = React.useCallback(function(e,type){
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('application/reactflow',type);
  },[]);

  var addNodeCenter = React.useCallback(function(type){
    idCounter++;
    setNodes(function(nds){return nds.concat([{id:'n'+idCounter,type:'custom',position:{x:300+Math.random()*100,y:150+Math.random()*100},data:{nodeType:type,label:NODE_DEFS[type].label}}])});
  },[setNodes]);

  // Keyboard delete
  React.useEffect(function(){
    var handler = function(e){
      if(e.key==='Delete' && selectedRef.current){
        var sid = selectedRef.current.id;
        var nt = selectedRef.current.data.nodeType;
        if(nt==='start'||nt==='end') return;
        setNodes(function(nds){return nds.filter(function(n){return n.id!==sid})});
        setEdges(function(eds){return eds.filter(function(e){return e.source!==sid&&e.target!==sid})});
        selectedRef.current = null; forceUpdate(function(c){return c+1});
      }
    };
    window.addEventListener('keydown',handler);
    return function(){window.removeEventListener('keydown',handler)};
  },[setNodes,setEdges]);

  // Update / Delete
  var updateNode = React.useCallback(function(nid,key,val){
    setNodes(function(nds){return nds.map(function(n){
      if(n.id!==nid) return n;
      var nd = Object.assign({},n.data); nd[key]=val;
      return Object.assign({},n,{data:nd});
    })});
    if(selectedRef.current && selectedRef.current.id===nid){
      var nd2 = Object.assign({},selectedRef.current.data); nd2[key]=val;
      selectedRef.current = Object.assign({},selectedRef.current,{data:nd2});
      forceUpdate(function(c){return c+1});
    }
  },[setNodes]);

  var deleteNode = React.useCallback(function(nid){
    setNodes(function(nds){return nds.filter(function(n){return n.id!==nid})});
    setEdges(function(eds){return eds.filter(function(e){return e.source!==nid&&e.target!==nid})});
    selectedRef.current = null; forceUpdate(function(c){return c+1});
  },[setNodes,setEdges]);

  // Render
  var sel = selectedRef.current;
  var statusText = {saved:'✅ 已保存',saving:'💾 保存中...',error:'❌ 保存失败'};

  return h('div',{style:{width:'100%',height:'100%',display:'flex',flexDirection:'column'}},
    // Top bar
    h('div',{className:'topbar'},
      h('div',{className:'topbar-brand'},'🕸️ ',h('span',null,'Agent Canvas')),
      h('input',{className:'topbar-title',value:titleRef.current,
        onChange:function(e){titleRef.current=e.target.value;forceUpdate(function(c){return c+1})},
        placeholder:'流程名称'}),
      h('div',{className:'topbar-status '+saveStatusRef.current}, statusText[saveStatusRef.current])
    ),
    // Layout
    h('div',{className:'app-layout'},
      // Toolbar
      h('div',{className:'toolbar'},
        TOOLBAR.map(function(item){
          return h('div',{key:item.type,className:'tool-btn','data-label':item.label,draggable:true,
            onDragStart:function(e){onDragStart(e,item.type)},
            onClick:function(){addNodeCenter(item.type)},title:item.label},item.icon);
        })
      ),
      // Canvas
      h('div',{style:{flex:1},onDragOver:onDragOver,onDrop:onDrop},
        h(ReactFlow.ReactFlow,{nodes:nodes,edges:edges,onNodesChange:onNodesChange,onEdgesChange:onEdgesChange,
          onConnect:onConnect,onNodeClick:onNodeClick,onPaneClick:onPaneClick,nodeTypes:nodeTypes,
          fitView:true,fitViewOptions:{padding:0.3},
          defaultEdgeOptions:{markerEnd:{type:ReactFlow.MarkerType.ArrowClosed,color:'#888'},style:{stroke:'#555',strokeWidth:2}},
          deleteKeyCode:['Delete']},
          h(ReactFlow.Background,{variant:'dots',gap:24,size:1,color:'#2a2a3e'}),
          h(ReactFlow.Controls,{showInteractive:false})
        )
      ),
      // Config Panel
      h(ConfigPanel,{node:sel,onUpdate:updateNode,onDelete:deleteNode})
    )
  );
}

function Root(){return h(ReactFlow.ReactFlowProvider,null,h(App))}

// Wait for ReactFlow to load, then mount
function mount(){
  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(h(Root));
}

// Check if ReactFlow is available
if(window.ReactFlow){
  mount();
} else {
  // Load ReactFlow
  var s = document.createElement('script');
  s.src = 'https://unpkg.com/reactflow@11.11.4/dist/umd/index.js';
  s.onload = mount;
  s.onerror = function(){document.getElementById('root').innerHTML='<div style="padding:40px;text-align:center;color:#888;font-family:sans-serif"><h2>⚠️ 加载失败</h2><p>无法加载 React Flow，请检查网络连接</p><p>需要访问 unpkg.com</p></div>'};
  document.head.appendChild(s);
}
</script>
</body>
</html>
