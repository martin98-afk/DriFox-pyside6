name: "辐射废土"
id: "fallout"
window:
  gradient_start: "rgba(8, 12, 6, 255)"
  gradient_end: "rgba(15, 20, 10, 255)"
background:
  chat_list:
    image: "./img.png"
    opacity: 0.15
    enabled: true
colors:
  card_bg: "rgba(18, 28, 12, 232)"
  card_bg_solid: "rgba(18, 28, 12, 250)"
  content_bg: "#0d1a08"
  border: "#3a5a2a"
  border_accent: "#35f78a"
  text_primary: "#c8e8c0"
  text_secondary: "rgba(180, 220, 160, 0.72)"
  text_muted: "#6a8a5a"
  accent: "#35f78a"
  accent_warm: "#d4a000"
  hover_bg: "rgba(53, 247, 138, 0.12)"
  selected_bg: "rgba(53, 247, 138, 0.28)"
  capsule_bg: "rgba(14, 22, 10, 180)"
  capsule_border: "rgba(58, 90, 42, 200)"

  # ── 全局 UI 基底 ──────────────────────────────────
  toolbar_bg: rgba(255, 255, 255, 0.05)
  divider_color: rgba(255, 255, 255, 0.06)
  hover_bg_strong: rgba(255, 255, 255, 0.10)
  scrollbar_handle_bg: rgba(255, 255, 255, 0.20)
  scrollbar_handle_hover_bg: rgba(255, 255, 255, 0.30)
  card_placeholder_text: '#b8a090'

  # ── 卡片级语义色 ──────────────────────────────────
  button_text_on_accent: '#1A1F2B'
  status_info: '#7FDBFF'
  status_danger_bg: rgba(220, 50, 50, 0.8)
  status_archive_bg: rgba(139, 92, 246, 0.8)
  card_bg_dim: rgba(255, 255, 255, 0.04)
  archived_card_bg: rgba(255, 180, 100, 0.08)
  archived_card_border: rgba(255, 150, 80, 0.2)

  # ── 语法高亮色 ────────────────────────────────────
  syntax_step: '#4EC9B0'
  syntax_tool: '#DCDCAA'
  syntax_success: '#6A9955'
  syntax_error: '#F14C4C'
  syntax_result: '#CE9178'

  # ── 标签色 ────────────────────────────────────────
  tag_accent: '#66c6ff'
  tag_accent_text: '#aae0ff'
  tag_purple: '#b388ff'
  tag_purple_text: '#d1b3ff'
  tag_orange: '#ffb366'
  tag_orange_text: '#ffc999'

  user_card_bg: "rgba(10, 32, 8, 160)"
  user_card_accent: "#35f78a"
  user_card_text: "#c8e8c0"
  user_card_muted: "#6a8a5a"
  assistant_card_bg: "rgba(40, 30, 10, 160)"
  assistant_card_accent: "#d4a000"
  assistant_card_text: "#f0e0c0"
  assistant_card_muted: "#a09070"
  agent_btn_text: "#6a8a5a"
  agent_btn_text_active: "#35f78a"
  agent_btn_bg_active: "rgba(53, 247, 138, 0.2)"
  agent_btn_separator: "rgba(58, 90, 42, 150)"
  input_bg_start: "rgba(10, 18, 8, 150)"
  input_bg_end: "rgba(16, 24, 12, 150)"
  input_focus_bg_start: "rgba(14, 22, 10, 220)"
  input_focus_bg_end: "rgba(20, 30, 14, 220)"
  input_text: "#b8d8b0"
  input_focus_text: "#c8e8c0"
  input_border: "#3a5a2a"
  input_focus_border: "#35f78a"
  input_placeholder: "rgba(180, 220, 160, 0.4)"
  # 聚焦发光 halo cascade — 主光源（输入卡）与 环境光晕（工具栏）分层
  glow_primary_alpha: 210
  glow_primary_blur: 30
  glow_ambient_alpha: 130
  glow_ambient_blur: 40

  # 底部工具栏条（与输入卡片解耦的第二张卡，独立 token 以便主题分别调控）
  toolbar_strip_bg: "rgba(16, 24, 12, 150)"
  toolbar_strip_border: "#3a5a2a"
  realtime_border: "#35f78a"
  realtime_accent: "#50ffaa"
  realtime_accent_warm: "#d4a000"
  realtime_success: "#35f78a"
  realtime_error: "#ff4444"
  realtime_bg: "rgba(10, 18, 8, 242)"
  realtime_text: "#c8e8c0"
  realtime_text_secondary: "rgba(180, 220, 160, 0.7)"
  realtime_tag_bg: "rgba(53, 247, 138, 0.15)"
  realtime_tag_border: "rgba(53, 247, 138, 0.3)"
  system_border: "#3a5a2a"
  system_accent: "#35f78a"
  send_btn_radius: 8
  send_btn_start: "#28c080"
  send_btn_end: "#1a9e60"
  send_btn_hover_start: "#30d090"
  send_btn_hover_end: "#20b070"
  timeline_node: "#3a5a2a"
  timeline_node_hover: "#35f78a"
  timeline_node_visible: "#50ffaa"
  timeline_node_selected: "#d4a000"
  timeline_line: "#2a3a1a"
  timeline_line_progress: "#35f78a"
  ring_normal: "#35f78a"
  ring_warning: "#d4a000"
  ring_danger: "#ff4444"
  ring_compacted: "#d4a000"
  branch_label_bg: "rgba(53, 247, 138, 0.15)"
  branch_label_border: "rgba(53, 247, 138, 0.3)"
  window_bg: "rgba(53, 247, 138, 0.04)"

  # ── 输入卡发光预设（ember 强度 70/30；颜色由上方 input_focus_border 决定）──
  input_glow_preset: "ember"